<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!--
  =====================================================================
  柔術ギルド ランキング — 最終完全版 v4（個人NFC対応）

  【NFCチェックイン】
  カードURL例: https://あなたのURL/bjj-guild-monitor.html?id=001
  ?id= に会員IDを付けることで個人チェックインが可能

  【スプレッドシート列】
  id | name | monthly | total | belt | category | last_reset
  =====================================================================
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ Guild Ranking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:         #04060a;
  --surface:    #0e1420;
  --card:       #131b2a;
  --border:     #243050;
  --border-hi:  #3a4d70;
  --gold:       #d4a84c;
  --gold-light: #f0d070;
  --gold-dim:   #7a5f28;
  --white:      #f4f0e8;
  --white-dim:  #c8c2b4;
  --muted:      #6a7490;
  --kids-a:     #5aacf0;
  --kids-a-dim: #1a4880;
  --kids-b:     #50d0a0;
  --kids-b-dim: #0a5038;
  --g1:  rgba(212,168,76,0.45);
  --g2:  rgba(190,190,205,0.35);
  --g3:  rgba(180,110,60,0.35);
  --ka1: rgba(90,172,240,0.5);
  --kb1: rgba(80,208,160,0.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--white);
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
  background-image:
    repeating-linear-gradient(0deg,  transparent, transparent 3px, rgba(255,255,255,0.013) 3px, rgba(255,255,255,0.013) 6px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.009) 3px, rgba(255,255,255,0.009) 6px);
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 900px 600px at 50% -80px, rgba(212,168,76,0.05) 0%, transparent 70%);
  animation: breathe 18s ease-in-out infinite alternate;
  pointer-events: none; z-index: 0;
}
@keyframes breathe { from{opacity:0.6;transform:scale(1);} to{opacity:1;transform:scale(1.08);} }

/* PC画面 */
.pc-screen { width:1920px; height:1080px; display:grid; grid-template-rows:110px 1fr 52px; position:relative; z-index:1; transition:opacity 0.6s ease; }
.pc-screen.fading { opacity:0; }
.pc-header { display:flex; align-items:center; justify-content:space-between; padding:0 56px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,rgba(212,168,76,0.04),transparent); position:relative; }
.pc-header::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold-light) 50%,var(--gold) 70%,transparent); transition:background 0.6s ease; }
.pc-header.kids-a-mode::before { background:linear-gradient(90deg,transparent,var(--kids-a-dim) 30%,var(--kids-a) 50%,var(--kids-a-dim) 70%,transparent); }
.pc-header.kids-b-mode::before { background:linear-gradient(90deg,transparent,var(--kids-b-dim) 30%,var(--kids-b) 50%,var(--kids-b-dim) 70%,transparent); }
.hdr-left { display:flex; flex-direction:column; gap:3px; }
.hdr-eyebrow { font-family:'Cinzel',serif; font-size:12px; letter-spacing:7px; color:var(--gold-dim); text-transform:uppercase; }
.hdr-title { font-family:'Cinzel',serif; font-size:38px; font-weight:900; letter-spacing:5px; background:linear-gradient(135deg,var(--gold-light),var(--gold) 55%,var(--gold-dim)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; text-transform:uppercase; }
.hdr-center { display:flex; flex-direction:column; align-items:center; gap:6px; }
.season-chip { display:flex; align-items:center; gap:10px; border:1px solid var(--gold-dim); background:linear-gradient(135deg,rgba(212,168,76,0.12),rgba(212,168,76,0.04)); padding:7px 22px; border-radius:2px; font-family:'Cinzel',serif; font-size:14px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
.month-chip { display:flex; align-items:center; gap:8px; font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
.month-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); animation:dotPulse 2s ease-in-out infinite; }
@keyframes dotPulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
.hdr-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; min-width:260px; }
.clock { font-family:'Cinzel',serif; font-size:36px; font-weight:700; letter-spacing:4px; color:var(--white); font-variant-numeric:tabular-nums; }
.clock-date { font-size:13px; letter-spacing:3px; color:var(--muted); font-family:'Cinzel',serif; text-transform:uppercase; }
.pc-main { display:grid; grid-template-columns:580px 1fr; overflow:hidden; position:relative; }
.pc-main::before { content:''; position:absolute; left:580px; top:0; bottom:0; width:1px; background:linear-gradient(180deg,transparent,var(--border) 15%,var(--border) 85%,transparent); z-index:2; }
.pc-footer { display:flex; align-items:center; justify-content:space-between; padding:0 56px; border-top:1px solid var(--border); background:linear-gradient(0deg,rgba(212,168,76,0.025),transparent); position:relative; }
.pc-footer::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold-light) 50%,var(--gold) 70%,transparent); }
.footer-left  { display:flex; align-items:center; gap:20px; }
.footer-right { display:flex; align-items:center; gap:16px; }
.footer-logo  { font-family:'Cinzel',serif; font-size:12px; letter-spacing:5px; color:var(--gold-dim); text-transform:uppercase; }
.footer-sep   { width:1px; height:18px; background:var(--border); }
.last-upd     { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; color:var(--muted); }
.next-fetch   { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; color:var(--muted); }
.bar-wrap { width:180px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.bar-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); border-radius:2px; width:0%; transition:width 1s linear; }
.slide-indicator { display:flex; align-items:center; gap:8px; }
.s-pip { width:8px; height:8px; border-radius:50%; border:1px solid var(--border); transition:all 0.4s ease; }
.s-pip.adult-on  { background:var(--gold);   border-color:var(--gold); }
.s-pip.kids-a-on { background:var(--kids-a); border-color:var(--kids-a); }
.s-pip.kids-b-on { background:var(--kids-b); border-color:var(--kids-b); }
.s-pip.off       { background:transparent; }
.slide-bar-wrap { width:160px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.slide-bar { height:100%; border-radius:2px; width:0%; }
.slide-bar.adult  { background:linear-gradient(90deg,var(--gold-dim),var(--gold)); }
.slide-bar.kids-a { background:linear-gradient(90deg,var(--kids-a-dim),var(--kids-a)); }
.slide-bar.kids-b { background:linear-gradient(90deg,var(--kids-b-dim),var(--kids-b)); }

/* Podium */
.podium-col { display:flex; flex-direction:column; padding:28px 36px 24px 56px; gap:14px; }
.col-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:6px; color:var(--gold-dim); text-transform:uppercase; display:flex; align-items:center; gap:12px; }
.col-label.kids-a { color:var(--kids-a-dim); }
.col-label.kids-b { color:var(--kids-b-dim); }
.col-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,currentColor,transparent); opacity:0.5; }
.cat-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; text-transform:uppercase; padding:3px 10px; border-radius:2px; border:1px solid; }
.cat-adult  { color:var(--gold);   border-color:var(--gold-dim);   background:rgba(212,168,76,0.1); }
.cat-kids-a { color:var(--kids-a); border-color:var(--kids-a-dim); background:rgba(90,172,240,0.1); }
.cat-kids-b { color:var(--kids-b); border-color:var(--kids-b-dim); background:rgba(80,208,160,0.1); }
.p-card { display:grid; grid-template-columns:60px 1fr auto; align-items:center; gap:18px; padding:20px 22px; border:1px solid var(--border); border-radius:4px; background:var(--card); position:relative; overflow:hidden; animation:slideInLeft 0.7s cubic-bezier(0.22,1,0.36,1) both; }
.p-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
.p-card::after  { content:''; position:absolute; inset:0; background:linear-gradient(90deg,rgba(255,255,255,0.012),transparent 40%); pointer-events:none; }
.p-card.a-r1  { border-color:var(--gold-dim); background:linear-gradient(135deg,#1a2235,var(--card) 60%); animation:slideInLeft 0.7s cubic-bezier(0.22,1,0.36,1) 0.05s both,rank1Pulse 6s ease-in-out 1s infinite; }
.p-card.a-r1::before { background:linear-gradient(180deg,var(--gold-light),var(--gold)); }
.p-card.a-r2  { border-color:rgba(180,180,195,0.3); box-shadow:0 0 24px var(--g2); animation-delay:0.15s; }
.p-card.a-r2::before { background:linear-gradient(180deg,#d8d8e8,#909098); }
.p-card.a-r3  { border-color:rgba(170,105,55,0.3); box-shadow:0 0 20px var(--g3); animation-delay:0.25s; }
.p-card.a-r3::before { background:linear-gradient(180deg,#d08860,#7a4828); }
.p-card.ka-r1 { border-color:var(--kids-a-dim); background:linear-gradient(135deg,#0e1e35,var(--card) 60%); animation:slideInLeft 0.7s cubic-bezier(0.22,1,0.36,1) 0.05s both,kaRank1Pulse 6s ease-in-out 1s infinite; }
.p-card.ka-r1::before { background:linear-gradient(180deg,#90d0f8,var(--kids-a)); }
.p-card.ka-r2 { border-color:rgba(40,130,200,0.3); box-shadow:0 0 24px rgba(40,130,200,0.3); animation-delay:0.15s; }
.p-card.ka-r2::before { background:linear-gradient(180deg,#4090d0,#205090); }
.p-card.ka-r3 { border-color:rgba(80,100,200,0.3); box-shadow:0 0 20px rgba(80,100,200,0.3); animation-delay:0.25s; }
.p-card.ka-r3::before { background:linear-gradient(180deg,#6080d8,#304090); }
.p-card.kb-r1 { border-color:var(--kids-b-dim); background:linear-gradient(135deg,#0a1e18,var(--card) 60%); animation:slideInLeft 0.7s cubic-bezier(0.22,1,0.36,1) 0.05s both,kbRank1Pulse 6s ease-in-out 1s infinite; }
.p-card.kb-r1::before { background:linear-gradient(180deg,#80e8c0,var(--kids-b)); }
.p-card.kb-r2 { border-color:rgba(40,160,120,0.3); box-shadow:0 0 24px rgba(40,160,120,0.3); animation-delay:0.15s; }
.p-card.kb-r2::before { background:linear-gradient(180deg,#40b890,#207860); }
.p-card.kb-r3 { border-color:rgba(60,140,100,0.3); box-shadow:0 0 20px rgba(60,140,100,0.3); animation-delay:0.25s; }
.p-card.kb-r3::before { background:linear-gradient(180deg,#50a878,#285840); }
@keyframes rank1Pulse  { 0%,100%{box-shadow:0 0 40px var(--g1),inset 0 1px 0 rgba(212,168,76,0.25);} 50%{box-shadow:0 0 70px rgba(212,168,76,0.6),inset 0 1px 0 rgba(212,168,76,0.4);} }
@keyframes kaRank1Pulse { 0%,100%{box-shadow:0 0 40px var(--ka1),inset 0 1px 0 rgba(90,172,240,0.25);} 50%{box-shadow:0 0 70px rgba(90,172,240,0.6),inset 0 1px 0 rgba(90,172,240,0.4);} }
@keyframes kbRank1Pulse { 0%,100%{box-shadow:0 0 40px var(--kb1),inset 0 1px 0 rgba(80,208,160,0.25);} 50%{box-shadow:0 0 70px rgba(80,208,160,0.6),inset 0 1px 0 rgba(80,208,160,0.4);} }
@keyframes slideInLeft { from{opacity:0;transform:translateX(-20px);} to{opacity:1;transform:translateX(0);} }
@keyframes fadeInRow   { from{opacity:0;transform:translateX(14px);} to{opacity:1;transform:translateX(0);} }
.p-avatar { width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:20px; font-weight:700; color:var(--bg); flex-shrink:0; }
.a-r1  .p-avatar { width:62px; height:62px; font-size:24px; background:linear-gradient(135deg,var(--gold-light),var(--gold)); box-shadow:0 0 18px rgba(212,168,76,0.6); }
.a-r2  .p-avatar { background:linear-gradient(135deg,#d8d8e4,#9898a8); }
.a-r3  .p-avatar { background:linear-gradient(135deg,#c87850,#7a4828); }
.ka-r1 .p-avatar { width:62px; height:62px; font-size:24px; background:linear-gradient(135deg,#90d0f8,var(--kids-a)); box-shadow:0 0 18px rgba(90,172,240,0.6); }
.ka-r2 .p-avatar { background:linear-gradient(135deg,#5090d0,#205090); }
.ka-r3 .p-avatar { background:linear-gradient(135deg,#6080d8,#304090); }
.kb-r1 .p-avatar { width:62px; height:62px; font-size:24px; background:linear-gradient(135deg,#80e8c0,var(--kids-b)); box-shadow:0 0 18px rgba(80,208,160,0.6); }
.kb-r2 .p-avatar { background:linear-gradient(135deg,#40b890,#207860); }
.kb-r3 .p-avatar { background:linear-gradient(135deg,#50a878,#285840); }
.p-info { min-width:0; }
.p-rank-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; text-transform:uppercase; display:flex; align-items:center; gap:5px; margin-bottom:3px; }
.a-r1  .p-rank-label,.ka-r1 .p-rank-label,.kb-r1 .p-rank-label { color:var(--gold); }
.a-r2  .p-rank-label { color:#b0b0c0; }
.a-r3  .p-rank-label { color:#c08860; }
.ka-r2 .p-rank-label { color:var(--kids-a); }
.ka-r3 .p-rank-label { color:#6080d8; }
.kb-r2 .p-rank-label { color:var(--kids-b); }
.kb-r3 .p-rank-label { color:#50a878; }
.p-name { font-size:26px; font-weight:900; color:var(--white); line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:7px; }
.a-r1 .p-name,.ka-r1 .p-name,.kb-r1 .p-name { font-size:32px; }
.p-badges { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.p-count-wrap { text-align:right; flex-shrink:0; }
.p-monthly { font-family:'Cinzel',serif; font-weight:900; line-height:1; display:block; }
.a-r1  .p-monthly,.ka-r1 .p-monthly,.kb-r1 .p-monthly { font-size:48px; color:var(--gold); }
.a-r2  .p-monthly { font-size:36px; color:#d0d0dc; }
.a-r3  .p-monthly { font-size:36px; color:#d09070; }
.ka-r2 .p-monthly { font-size:36px; color:var(--kids-a); }
.ka-r3 .p-monthly { font-size:36px; color:#6080d8; }
.kb-r2 .p-monthly { font-size:36px; color:var(--kids-b); }
.kb-r3 .p-monthly { font-size:36px; color:#50a878; }
.p-unit  { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; display:block; margin-top:1px; }
.p-total { font-size:11px; color:var(--muted); display:block; margin-top:4px; }
.p-total span { color:var(--white-dim); font-weight:700; }
.crown { font-size:16px; animation:crownPulse 3s ease-in-out infinite; }
@keyframes crownPulse { 0%,100%{filter:drop-shadow(0 0 4px rgba(212,168,76,0.5));} 50%{filter:drop-shadow(0 0 12px rgba(212,168,76,1));} }

/* Ranking List */
.list-col { display:flex; flex-direction:column; padding:28px 56px 24px 36px; gap:0; overflow:hidden; }
.list-header { display:grid; grid-template-columns:64px 1fr 260px 100px 130px; gap:0; padding:8px 18px; margin-top:10px; border-bottom:1px solid var(--border-hi); }
.list-header span { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
.lh-monthly,.lh-total { text-align:right; }
.r-row { display:grid; grid-template-columns:64px 1fr 260px 100px 130px; align-items:center; gap:0; height:62px; padding:0 18px; border-bottom:1px solid rgba(36,48,80,0.55); animation:fadeInRow 0.5s ease both; }
.r-row:nth-child(even) { background:rgba(255,255,255,0.012); }
.r-row:nth-child(1)  { animation-delay:0.04s; }
.r-row:nth-child(2)  { animation-delay:0.08s; }
.r-row:nth-child(3)  { animation-delay:0.12s; }
.r-row:nth-child(4)  { animation-delay:0.16s; }
.r-row:nth-child(5)  { animation-delay:0.20s; }
.r-row:nth-child(6)  { animation-delay:0.24s; }
.r-row:nth-child(7)  { animation-delay:0.28s; }
.r-row:nth-child(8)  { animation-delay:0.32s; }
.r-row:nth-child(9)  { animation-delay:0.36s; }
.r-row:nth-child(10) { animation-delay:0.40s; }
.r-row:nth-child(11) { animation-delay:0.44s; }
.r-row:nth-child(12) { animation-delay:0.48s; }
.r-num  { font-family:'Cinzel',serif; font-size:24px; font-weight:700; color:var(--muted); }
.r-row.top6 .r-num { color:var(--white-dim); }
.r-name { font-size:24px; font-weight:700; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:10px; }
.r-title-cell { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.r-monthly-cell { text-align:right; }
.r-monthly { font-family:'Cinzel',serif; font-size:28px; font-weight:700; color:var(--white); line-height:1; display:block; }
.r-m-unit  { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
.r-total-cell { text-align:right; padding-left:8px; }
.r-total { font-size:13px; color:var(--muted); }
.r-total span { color:var(--white-dim); font-weight:700; font-size:15px; }

/* 称号バッジ */
.t-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 13px 5px 10px; border-radius:2px; border:1px solid; font-family:'Noto Sans JP',sans-serif; font-size:13px; letter-spacing:1px; font-weight:700; white-space:nowrap; position:relative; overflow:hidden; }
.t-icon { font-size:13px; }
.t-low  { color:#8090b0; border-color:rgba(128,144,176,0.35); background:rgba(128,144,176,0.07); }
.t-mid  { color:#70a8e0; border-color:rgba(80,140,210,0.45);  background:rgba(80,140,210,0.08);  box-shadow:0 0 10px rgba(80,140,210,0.2); }
.t-high { color:var(--gold-light); border-color:rgba(212,168,76,0.75); background:rgba(212,168,76,0.11); animation:highPulse 2.5s ease-in-out infinite; }
.t-high::after { content:''; position:absolute; top:0; left:-100%; width:55%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent); animation:shimmer 2.4s ease-in-out infinite; }
@keyframes highPulse { 0%,100%{box-shadow:0 0 10px rgba(212,168,76,0.35);} 50%{box-shadow:0 0 28px rgba(212,168,76,0.8),0 0 50px rgba(212,168,76,0.25);} }
@keyframes shimmer { 0%{left:-60%;} 100%{left:140%;} }

/* 帯バッジ */
.b-badge { display:inline-flex; align-items:center; gap:7px; padding:4px 12px 4px 10px; border-radius:2px; border:1px solid; font-size:13px; letter-spacing:2px; font-weight:700; text-transform:uppercase; }
.b-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.b-white  { color:#e8e4dc; border-color:rgba(232,228,220,0.3); background:rgba(232,228,220,0.07); }
.b-white .b-dot   { background:#e8e4dc; }
.b-blue   { color:#70b0f0; border-color:rgba(30,95,168,0.55);  background:rgba(30,95,168,0.12); }
.b-blue .b-dot    { background:#1e5fa8; }
.b-purple { color:#c090f0; border-color:rgba(112,48,184,0.55); background:rgba(112,48,184,0.12); }
.b-purple .b-dot  { background:#7030b8; }
.b-brown  { color:#d09878; border-color:rgba(138,72,32,0.55);  background:rgba(138,72,32,0.15); }
.b-brown .b-dot   { background:#8a4820; }
.b-black  { color:#b0b0b8; border-color:rgba(110,110,120,0.45); background:rgba(80,80,90,0.12); }
.b-black .b-dot   { background:#505058; box-shadow:0 0 5px rgba(255,255,255,0.18); }
.b-gray   { color:#c0c0c8; border-color:rgba(140,140,155,0.45); background:rgba(140,140,155,0.1); }
.b-gray .b-dot    { background:#909098; }
.b-yellow { color:#e8cc40; border-color:rgba(212,184,32,0.5);  background:rgba(212,184,32,0.1); }
.b-yellow .b-dot  { background:#d4b820; }
.b-orange { color:#e89040; border-color:rgba(208,104,32,0.5);  background:rgba(208,104,32,0.1); }
.b-orange .b-dot  { background:#d06820; }
.b-green  { color:#50c870; border-color:rgba(42,136,64,0.5);   background:rgba(42,136,64,0.1); }

// ============================================================
// ★★★ 設定 ★★★
// ============================================================
const SHEET_API_URL     = 'https://script.google.com/macros/s/AKfycbxsNt0BEs8MR1oGvsn4v6bTpLeq-qd6mOzYJCvqGgmdjlkXDvVZKE7Qnxkx5GUed8hquQ/exec';
const FETCH_INTERVAL_MS = 5 * 60 * 1000;
const SLIDE_INTERVAL_MS = 15 * 1000;
const SLIDES            = ['adult', 'kids_a', 'kids_b'];

// ============================================================
// URLパラメータから会員IDを取得
// NFCカードのURL例: ...?id=001
// ============================================================
const URL_PARAMS  = new URLSearchParams(window.location.search);
const NFC_MEMBER_ID = URL_PARAMS.get('id') || '';

// ============================================================
// 称号システム
// ============================================================
const ADULT_TITLES = {
  white:  [{min:0,name:'荒削りの拳',level:'low'},{min:80,name:'転がる石',level:'mid'},{min:160,name:'這い上がる者',level:'high'}],
  blue:   [{min:0,name:'双脚の狩人',level:'low'},{min:80,name:'崩しの使い手',level:'mid'},{min:160,name:'制圧の申し子',level:'high'}],
  purple: [{min:0,name:'千手の術師',level:'low'},{min:80,name:'背後霊',level:'mid'},{min:160,name:'関節の支配者',level:'high'}],
  brown:  [{min:0,name:'呼吸の読者',level:'low'},{min:80,name:'沈黙の絞首人',level:'mid'},{min:160,name:'畳の亡霊',level:'high'}],
  black:  [{min:0,name:'道の求道者',level:'low'},{min:80,name:'畳の番人',level:'mid'},{min:160,name:'柔術の化身👑',level:'high'}],
};
const KIDS_TITLES = {
  white:  [{min:0,name:'ガードの見習い',level:'low'},{min:30,name:'タップの洗礼',level:'mid'},{min:60,name:'スイープの使い手',level:'high'}],
  gray:   [{min:0,name:'マウントの狩人',level:'low'},{min:30,name:'エスケープの達人',level:'mid'},{min:60,name:'サブミッションの影',level:'high'}],
  yellow: [{min:0,name:'トライアングルの閃光',level:'low'},{min:30,name:'パスの鬼',level:'mid'},{min:60,name:'バックの支配者',level:'high'}],
  orange: [{min:0,name:'チョークの刺客',level:'low'},{min:30,name:'トランジションの魔術師',level:'mid'},{min:60,name:'フローの使い手',level:'high'}],
  green:  [{min:0,name:'ポジションの王',level:'low'},{min:30,name:'フィニッシャー',level:'mid'},{min:60,name:'道場の伝説👑',level:'high'}],
};
function getTitle(member) {
  const isKids = member.category !== 'adult';
  const table  = isKids ? KIDS_TITLES : ADULT_TITLES;
  const steps  = table[member.belt] || Object.values(table)[0];
  const monthly = member.monthly || 0;
  let result = steps[0];
  for (const s of steps) { if (monthly >= s.min) result = s; }
  return result;
}
function titleBadgeHTML(member) {
  const t = getTitle(member);
  return `<span class="t-badge t-${t.level}"><span class="t-icon">${t.level==='high'?'⭐':t.level==='mid'?'🔥':'◆'}</span>${t.name}</span>`;
}

// 帯バッジ
const ADULT_BELT_LABELS = {white:'白帯',blue:'青帯',purple:'紫帯',brown:'茶帯',black:'黒帯'};
const KIDS_BELT_LABELS  = {white:'白帯',gray:'グレー',yellow:'イエロー',orange:'オレンジ',green:'グリーン'};
function beltHTML(belt, category) {
  const isKids = category !== 'adult';
  const labels = isKids ? KIDS_BELT_LABELS : ADULT_BELT_LABELS;
  const valid  = isKids ? ['white','gray','yellow','orange','green'] : ['white','blue','purple','brown','black'];
  const safe   = valid.includes(belt) ? belt : valid[0];
  return `<span class="b-badge b-${safe}"><span class="b-dot"></span>${labels[safe]||safe}</span>`;
}

// 帯昇格トラッカー
const BELT_THRESHOLDS = (() => {
  const steps = [{from:'white',to:'blue',need:250},{from:'blue',to:'purple',need:300},{from:'purple',to:'brown',need:300},{from:'brown',to:'black',need:400}];
  let acc = 0;
  return steps.map(s => { const start=acc; acc+=s.need; return {...s,start,end:acc}; });
})();

let slideIndex   = 0;
let mobileTab    = 'adult';
let slideRaf     = null;
let slideStart   = null;

function rankLabel(r) { return r===1?'1ST':r===2?'2ND':r===3?'3RD':`${r}`; }
function initial(name) { return (name||'?')[0]; }
function getCurrentMonthLabel() {

// ============================================================
// チェックイン機能（NFC個人対応）
// auto=1 パラメータがあれば自動でチェックイン実行
// ============================================================
const AUTO_CHECKIN = URL_PARAMS.get('auto') === '1';

function initCheckin() {
  const personal    = document.getElementById('checkinPersonal');
  const genericBtn  = document.getElementById('genericCheckinBtn');
  const checkinHint = document.getElementById('checkinHint');

  if (NFC_MEMBER_ID && nfcMember) {
    // カテゴリに合わせてタブを切り替え
    if (nfcMember.category) switchMobileTab(nfcMember.category);

    if (AUTO_CHECKIN) {
      // auto=1 → データ取得完了後に自動チェックイン実行
      // 少し待ってから実行（画面描画完了を待つ）
      setTimeout(() => doCheckin(), 300);
    } else {
      // 手動チェックイン画面を表示
      personal.classList.add('show');
      document.getElementById('checkinName').textContent    = nfcMember.name;
      document.getElementById('checkinMonthly').textContent = nfcMember.monthly;
      document.getElementById('checkinTotal').textContent   = nfcMember.total.toLocaleString();
    }
  } else if (NFC_MEMBER_ID && !nfcMember) {
    checkinHint.textContent  = `ID: ${NFC_MEMBER_ID} が見つかりませんでした`;
    genericBtn.style.display = 'block';
  } else {
    genericBtn.style.display = 'block';
    checkinHint.textContent  = 'NFCカードをタップするか、スタッフに声をかけてください';
  }
}

async function doCheckin() {
  if (!nfcMember || checkinDone) return;
  checkinDone = true;

  // ボタンがある場合のみ操作（手動モード）
  const btn = document.getElementById('checkinBtn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }

  // auto=1 の場合はすぐに「処理中」表示
  if (AUTO_CHECKIN) {
    const done = document.getElementById('checkinDone');
    document.getElementById('doneeName').textContent   = nfcMember.name;
    document.getElementById('doneMonthly').textContent = nfcMember.monthly;
    document.getElementById('doneTotal').textContent   = nfcMember.total.toLocaleString();
    done.classList.add('show');
  }

  try {
    const res  = await fetch(SHEET_API_URL, {
      method: 'POST',
      body:   JSON.stringify({ id: NFC_MEMBER_ID }),
    });
    const data = await res.json();

    if (data.success) {
      // 完了画面を更新（実際の数値に）
      document.getElementById('checkinPersonal').classList.remove('show');
      const done = document.getElementById('checkinDone');
      done.classList.add('show');
      document.getElementById('doneeName').textContent    = nfcMember.name;
      document.getElementById('doneMonthly').textContent  = data.monthly;
      document.getElementById('doneTotal').textContent    = data.total.toLocaleString();
      // データを再取得して反映
      setTimeout(() => fetchData(true), 1500);
      // 4秒後にページをリセット（次の人のために）
      setTimeout(() => {
        window.location.href = window.location.pathname;
      }, 4000);
    } else {
      checkinDone = false;
      if (btn) { btn.disabled = false; btn.textContent = '⚔ チェックイン'; }
      showMobileToast('エラーが発生しました');
    }
  } catch(e) {
    checkinDone = false;
    if (btn) { btn.disabled = false; btn.textContent = '⚔ チェックイン'; }
    showMobileToast('通信エラーです');
  }
}

function showCheckinHint() {
  showMobileToast('NFCカードでチェックインしてください');
}

// ============================================================
// 称号エフェクト
// ============================================================
function checkTitleChanges(members) {
  for (const m of members) {
    const key      = `${m.name}_${m.category}`;
    const newTitle = getTitle(m).name;
    const oldTitle = prevTitles[key];
    if (oldTitle && oldTitle !== newTitle) fireTitleEffect(m.name, newTitle);
    prevTitles[key] = newTitle;
  }
}
function fireTitleEffect(name, titleName) {
  const flash = document.getElementById('titleFlash');
  flash.className = 'title-flash'; void flash.offsetWidth;
  flash.className = 'title-flash fire';
  document.getElementById('popupName').textContent  = name;
  document.getElementById('popupTitle').textContent = titleName;
  const popup = document.getElementById('titlePopup');
  popup.className = 'title-popup'; void popup.offsetWidth;
  popup.className = 'title-popup fire';
  fireConfetti();
}
function fireConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx    = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  canvas.style.opacity = '1';
  const colors = ['#f0d070','#d4a84c','#ffffff','#5aacf0','#50d0a0','#c090f0'];
  const pieces = Array.from({length:120}, () => ({
    x:Math.random()*canvas.width, y:-20,
    w:Math.random()*10+5, h:Math.random()*5+3,
    color:colors[Math.floor(Math.random()*colors.length)],
    speed:Math.random()*4+2, angle:Math.random()*360,
    spin:Math.random()*6-3, drift:Math.random()*2-1,
  }));
  let frame=0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height); let alive=false;
    for (const p of pieces) {
      p.y+=p.speed; p.x+=p.drift; p.angle+=p.spin;
      if (p.y<canvas.height+20) alive=true;
      ctx.save(); ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,1-p.y/canvas.height);
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    }
    if (alive&&frame<180){frame++;requestAnimationFrame(draw);}
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.opacity='0';}
  }
  draw();
}

// ============================================================
// データ取得
// ============================================================
async function fetchData(isRefresh = false) {
  fetchElapsed = 0;
  if (!isRefresh) showOverlay('loadingOv');
  else {
    document.getElementById('pcScreen').classList.add('fading');
    await sleep(550); showOverlay('refreshOv');
  }

  try {
    const res  = await fetch(`${SHEET_API_URL}?t=${Date.now()}`);
    const data = await res.json();
    if (data.error || !Array.isArray(data.members)) throw new Error(data.error||'invalid');
    allMembers = data.members;
  } catch(e) {
    console.error(e);
    if (!allMembers.length) allMembers = SAMPLE;
  }

  // NFCで特定された会員を探す
  if (NFC_MEMBER_ID) {
    nfcMember = allMembers.find(m => String(m.id).trim() === String(NFC_MEMBER_ID).trim()) || null;
  }

  checkTitleChanges(allMembers);
  hideAllOverlays();
  document.getElementById('pcScreen').classList.remove('fading');
  setLastUpdate();
  renderPC();
  renderMobile();

  // 初回のみチェックイン画面を初期化
  if (!isRefresh) initCheckin();

  setTimeout(() => fetchData(true), FETCH_INTERVAL_MS);
}

      </div>

      <div class="p-card ${rClass[i]}">
        <div class="p-avatar">${initial(m.name)}</div>
        <div class="p-info">
          <div class="p-rank-label">${i===0?'<span class="crown">👑</span>':''}${rankLabel(i+1)} Place</div>
          <div class="p-name">${m.name}</div>
          <div class="p-badges">${titleBadgeHTML(m)}${beltHTML(m.belt,cat)}</div>
        </div>
        <div class="p-count-wrap">
          <span class="p-monthly">${m.monthly}</span>
          <span class="p-unit">sessions / month</span>
          <span class="p-total">累計 <span>${m.total.toLocaleString()}</span> 回</span>
        </div>
      </div>`).join('')}
    </div>`;
  const listHTML=`
    <div class="list-col">
      <div class="col-label ${colLabelClass}" style="justify-content:flex-end;">▸ Full Rankings</div>
      <div class="list-header">
        <span>Rank</span><span>Fighter</span><span>称号 / 帯</span>
        <span class="lh-monthly">Monthly</span><span class="lh-total">Total</span>
      </div>
      <div>${rest.map((m,i)=>`
        <div class="r-row ${i<3?'top6':''}" style="animation-delay:${i*0.04}s">
          <div class="r-num">${i+4}</div>
          <div class="r-name">${m.name}</div>
          <div class="r-title-cell">${titleBadgeHTML(m)}${beltHTML(m.belt,cat)}</div>
          <div class="r-monthly-cell"><span class="r-monthly">${m.monthly}</span><span class="r-m-unit">sessions</span></div>
          <div class="r-total-cell"><span class="r-total">累計 <span>${m.total.toLocaleString()}</span> 回</span></div>
        </div>`).join('')}
      </div>
    </div>`;
  const main=document.getElementById('pcMain');
  main.innerHTML=podiumHTML+listHTML;
  startSlideProgress();
}

function startSlideProgress() {
  if (slideRaf) cancelAnimationFrame(slideRaf);
  slideStart=null;
  function animate(ts) {
    if (!slideStart) slideStart=ts;
    const elapsed=ts-slideStart;
    const pct=Math.min((elapsed/SLIDE_INTERVAL_MS)*100,100);
    const bar=document.getElementById('slideBar');
    if (bar) bar.style.width=pct+'%';
    if (elapsed<SLIDE_INTERVAL_MS) { slideRaf=requestAnimationFrame(animate); }
    else { toggleSlide(); }
  }
  slideRaf=requestAnimationFrame(animate);
}
function toggleSlide() {
  slideIndex=(slideIndex+1)%SLIDES.length;
  const main=document.getElementById('pcMain');
  main.style.opacity='0'; main.style.transition='opacity 0.5s ease';
  setTimeout(()=>{renderPCSlide(SLIDES[slideIndex]);main.style.opacity='1';},500);
}

// 帯昇格トラッカー
function searchTracker() {
  const query=document.getElementById('searchInput').value.trim();
  const result=document.getElementById('trackerResult');
  if (!query){result.innerHTML='';return;}
  const member=allMembers.find(m=>m.name.includes(query)&&m.category==='adult');
  if (!member) {
    const km=allMembers.find(m=>m.name.includes(query)&&m.category!=='adult');
    result.innerHTML=km
      ?`<div class="tracker-kids-note">「${km.name}」はキッズカテゴリのため<br>帯昇格トラッカーはアダルトのみ対応しています</div>`
      :`<div class="tracker-not-found">「${query}」が見つかりませんでした</div>`;
    return;
  }
  const total=member.total;
  const stepsHTML=BELT_THRESHOLDS.map(step=>{
    const isDone=total>=step.end; const isInProg=!isDone&&total>=step.start;
    const filled=isDone?step.need:isInProg?total-step.start:0;
    const pct=isDone?100:isInProg?Math.round((filled/step.need)*100):0;
    const barCls=isDone?'done':isInProg?'prog':'none';
    const countTxt=isDone?'達成 ✓':`${filled} / ${step.need} 回`;
    return `<div class="tracker-step">
      <div class="ts-header">
        <div class="ts-label">${beltHTML(step.from,'adult')}<span style="color:var(--muted)">→</span>${beltHTML(step.to,'adult')}</div>
        <span class="ts-count ${isDone?'done':''}">${countTxt}</span>
      </div>
      <div class="ts-bar-wrap"><div class="ts-bar ${barCls}" style="width:${Math.max(pct,barCls==='none'?0:2)}%"></div></div>
    </div>`;
  }).join('');
  result.innerHTML=`
    <div class="m-tracker show">
      <div class="m-tracker-header">
        <div class="m-tracker-avatar">${initial(member.name)}</div>
        <div>
          <div class="m-tracker-name">${member.name}</div>
          <div class="m-tracker-meta">${beltHTML(member.belt,'adult')} &nbsp; 今月 <span>${member.monthly}</span> 回</div>
        </div>
      </div>
      <div class="tracker-steps">${stepsHTML}</div>
      <div class="tracker-total">
        <span class="tt-label">累計参加回数</span>
        <div><span class="tt-val">${total.toLocaleString()}</span><span class="tt-unit">回</span></div>
      </div>
    </div>`;
}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchTracker();});

// 時計
const DAYS_JP=['日','月','火','水','木','金','土'];
function updateClock() {
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  const ss=String(now.getSeconds()).padStart(2,'0');
  const ce=document.getElementById('pcClock'); if(ce) ce.textContent=`${hh}:${mm}:${ss}`;
  const de=document.getElementById('pcDate');  if(de) de.textContent=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}（${DAYS_JP[now.getDay()]}）`;
}
setInterval(updateClock,1000); updateClock();

function tickFetch() {
  fetchElapsed+=1000;
  const remain=Math.max(0,FETCH_INTERVAL_MS-fetchElapsed);
  const rm=Math.floor(remain/60000); const rs=Math.floor((remain%60000)/1000);
  const ne=document.getElementById('pcNextFetch'); if(ne) ne.textContent=`Next: ${rm}:${String(rs).padStart(2,'0')}`;
  const fb=document.getElementById('fetchBar');    if(fb) fb.style.width=Math.min((fetchElapsed/FETCH_INTERVAL_MS)*100,100)+'%';
}
setInterval(tickFetch,1000);

function setLastUpdate() {
  const now=new Date();
  const ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const pe=document.getElementById('pcLastUpd');    if(pe) pe.textContent=`Last Updated: ${ts}`;
  const me=document.getElementById('mLastUpd');     if(me) me.textContent=`Last Updated: ${ts}`;
  const pm=document.getElementById('pcMonthLabel'); if(pm) pm.textContent=getCurrentMonthLabel();
  const mm=document.getElementById('mMonthLabel');  if(mm) mm.textContent=getCurrentMonthLabel();
}

function showOverlay(id)   { document.getElementById(id)?.classList.add('show'); }
function hideAllOverlays() { ['loadingOv','refreshOv'].forEach(id=>document.getElementById(id)?.classList.remove('show')); }
