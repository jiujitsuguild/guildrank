<script>

// ============================================================
// ★★★ 設定 ★★★
// ============================================================
const SHEET_API_URL     = 'https://script.google.com/macros/s/AKfycby2JccMgbhyggYfB-esKMEkW6-NRei55qp5C0hCSX7KTtzLDqjLA3ByDVGNYtkNS7MY/exec';
const FETCH_INTERVAL_MS = 5 * 60 * 1000;
const SLIDE_INTERVAL_MS = 10 * 1000;
const SLIDES            = ['adult', 'kids_a', 'kids_b'];
const USE_SAMPLE        = false;


// ============================================================
// 状態
// ============================================================
let allMembers   = [];
let slideIndex   = 0;
let mobileTab    = 'adult';
let slideRaf     = null;
let slideStart   = null;
let fetchElapsed = 0;

let prevTitles   = {};
let isFirstLoad  = true;


// ============================================================
// 称号
// ============================================================
function getTitle(m){
  if(m.monthly >= 160) return {name:'頂点捕食者', level:'high'};
  if(m.monthly >= 80)  return {name:'戦場の支配者', level:'mid'};
  return {name:'挑戦者', level:'low'};
}

function checkTitleChanges(members) {
  for (const m of members) {
    const key = `${m.name}_${m.category}`;
    const newTitle = getTitle(m).name;
    const oldTitle = prevTitles[key];

    if (!isFirstLoad && oldTitle && oldTitle !== newTitle) {
      fireTitleEffect(m.name, newTitle);
    }

    prevTitles[key] = newTitle;
  }
  isFirstLoad = false;
}


// ============================================================
// データ取得
// ============================================================
async function fetchData(isRefresh = false) {
  fetchElapsed = 0;

  try {
    if (USE_SAMPLE) {
      allMembers = SAMPLE;
    } else {
      const res = await fetch(`${SHEET_API_URL}?t=${Date.now()}`);
      const data = await res.json();

      if (!data || !Array.isArray(data.members)) throw new Error();
      allMembers = data.members;
    }
  } catch(e) {
    console.error(e);
    if (!allMembers.length) allMembers = SAMPLE;
  }

  checkTitleChanges(allMembers);
  renderPC();
  setTimeout(() => fetchData(true), FETCH_INTERVAL_MS);
}


// ============================================================
// レンダリング
// ============================================================
function renderPC() {
  const container = document.body;
  container.innerHTML = allMembers
    .sort((a,b)=>b.monthly-a.monthly)
    .map((m,i)=>`
      <div style="padding:10px;border-bottom:1px solid #333">
        ${i+1}. ${m.name} - ${m.monthly}回 (${getTitle(m).name})
      </div>
    `).join('');
}


// ============================================================
// エフェクト（簡略）
// ============================================================
function fireTitleEffect(name,title){
  console.log(`昇格: ${name} → ${title}`);
}


// ============================================================
// サンプル
// ============================================================
const SAMPLE = [
  {name:'テスト太郎', monthly:100, total:300, belt:'blue', category:'adult'}
];


// ============================================================
// 起動
// ============================================================
fetchData();

</script>
